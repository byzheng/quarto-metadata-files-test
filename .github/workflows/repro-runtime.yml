name: Repro Runtime

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  R_VERSION: '4.5.0'
  QUARTO_VERSION: '1.8.27'

jobs:
  repro:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ env.R_VERSION }}

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: ${{ env.QUARTO_VERSION }}

      - name: Install R dependencies
        shell: Rscript {0}
        run: |
          install.packages("quarto", repos = "https://cloud.r-project.org")

      - name: Run repro script on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        env:
          RESULTS_DIR: ci-results/${{ runner.os }}
        run: |
          set -euo pipefail
          mkdir -p "$RESULTS_DIR"
          quarto --version | tee "$RESULTS_DIR/quarto-version.txt"
          Rscript --version 2>&1 | tee "$RESULTS_DIR/r-version.txt"
          Rscript test.R | tee "$RESULTS_DIR/test.log"

      - name: Run repro script on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RESULTS_DIR: ci-results/${{ runner.os }}
        run: |
          New-Item -ItemType Directory -Force -Path $env:RESULTS_DIR | Out-Null
          quarto --version | Tee-Object -FilePath "$env:RESULTS_DIR/quarto-version.txt"
          Rscript --version 2>&1 | Tee-Object -FilePath "$env:RESULTS_DIR/r-version.txt"
          Rscript test.R 2>&1 | Tee-Object -FilePath "$env:RESULTS_DIR/test.log"

      - name: Upload runtime artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: timing-${{ runner.os }}
          path: ci-results/${{ runner.os }}
          if-no-files-found: error

  summarize:
    name: Summarize runtimes
    runs-on: ubuntu-latest
    needs: repro
    if: always()

    steps:
      - name: Download runtime artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: timing-*
          path: ci-results
          merge-multiple: false

      - name: Build summary table
        shell: python
        run: |
          import csv
          import os
          import re
          from pathlib import Path

          base_dir = Path("ci-results")
          run_dirs = sorted(path for path in base_dir.glob("timing-*") if path.is_dir())

          runtime_lines = [
              "# Runtime results",
              "",
              "| OS | Scenario | Elapsed (s) | User (s) | System (s) |",
              "| --- | --- | ---: | ---: | ---: |",
          ]

          detail_lines = [
            "",
            "# Environment details",
            "",
            "| OS | Platform | R | Quarto | Quarto Rscript calls |",
            "| --- | --- | --- | --- | ---: |",
          ]

          combined_rows = []
          detail_rows = []

          def read_text(path: Path) -> str:
            if not path.exists():
              return ""
            return path.read_text(encoding="utf-8", errors="replace").strip()

          def clean_cell(value: str) -> str:
            sanitized = value.replace("\n", " ").replace("\r", " ").strip()
            return sanitized.replace("|", "\\|") or "n/a"

          if not run_dirs:
            runtime_lines.append("| n/a | n/a | n/a | n/a | n/a |")
            detail_lines.append("| n/a | n/a | n/a | n/a | n/a |")
            detail_lines.append("")
            detail_lines.append("No timing artifacts were produced.")
          else:
            for run_dir in run_dirs:
              os_name = run_dir.name.removeprefix("timing-")
              csv_path = run_dir / "timings.csv"
              log_path = run_dir / "test.log"
              quarto_version = read_text(run_dir / "quarto-version.txt")
              r_version_output = read_text(run_dir / "r-version.txt")
              rscript_calls = len(
                re.findall(r"\\[execProcess\\].*Rscript(?:\\.exe)?.*share[/\\\\]rmd[/\\\\]rmd\\.R", read_text(log_path))
              )

              platform_value = "n/a"
              r_value = clean_cell(r_version_output)
              quarto_value = clean_cell(quarto_version)

                  with csv_path.open(newline="", encoding="utf-8") as handle:
                      reader = csv.DictReader(handle)
                      for row in reader:
                  platform_value = clean_cell(row.get("platform", "n/a"))
                  r_value = clean_cell(row.get("r_version", r_version_output))
                  quarto_value = clean_cell(row.get("quarto_version", quarto_version))
                          combined_rows.append(
                              {
                                  "os": os_name,
                                  "scenario": row["scenario"],
                      "platform": row.get("platform", ""),
                      "r_version": row.get("r_version", ""),
                      "quarto_version": row.get("quarto_version", ""),
                      "rscript_calls": rscript_calls,
                                  "elapsed": row["elapsed"],
                                  "user": row["user"],
                                  "system": row["system"],
                              }
                          )
                  runtime_lines.append(
                              f"| {os_name} | {row['scenario']} | {row['elapsed']} | {row['user']} | {row['system']} |"
                          )

              detail_rows.append(
                {
                  "os": os_name,
                  "platform": platform_value,
                  "r_version": r_value,
                  "quarto_version": quarto_value,
                  "rscript_calls": rscript_calls,
                }
              )
              detail_lines.append(
                f"| {os_name} | {platform_value} | {r_value} | {quarto_value} | {rscript_calls} |"
              )

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          summary_path.write_text("\n".join(runtime_lines + detail_lines) + "\n", encoding="utf-8")

          combined_csv = base_dir / "combined-timings.csv"
          with combined_csv.open("w", newline="", encoding="utf-8") as handle:
              writer = csv.DictWriter(
                  handle,
                fieldnames=["os", "scenario", "platform", "r_version", "quarto_version", "rscript_calls", "elapsed", "user", "system"],
              )
              writer.writeheader()
              writer.writerows(combined_rows)

          detail_csv = base_dir / "platform-details.csv"
          with detail_csv.open("w", newline="", encoding="utf-8") as handle:
              writer = csv.DictWriter(
                handle,
                fieldnames=["os", "platform", "r_version", "quarto_version", "rscript_calls"],
              )
              writer.writeheader()
              writer.writerows(detail_rows)

      - name: Upload combined summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: timing-summary
          path: |
            ci-results/combined-timings.csv
            ci-results/platform-details.csv
          if-no-files-found: error